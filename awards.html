<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Awards — Art Public</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
    :root {
      --ink: #666193;
      --ink-light: #6b6560;
      --accent: #d1a2a9;
      --rule: #d8d2c8;
    }
 
    html { font-size: 18px; scroll-behavior: smooth; }
 
    body {
      background: #000000;
      color: #FFFFFF;
      font-family: 'EB Garamond', Georgia, serif;
      line-height: 1.8;
      -webkit-font-smoothing: antialiased;
    }
 
    /* ── HEADER ── */
    header {
      padding: 2.5rem 2rem 1.5rem;
      text-align: center;
      position: sticky;
      top: 0;
      background: #000000;
      z-index: 100;
    }
 
    header::after {
      content: '';
      display: block;
      width: 75%;
      margin: 1.5rem auto 0;
      height: 1px;
      background: var(--rule);
    }
 
    .site-title {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 1.9rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: #FFFFFF;
      text-decoration: none;
    }
 
    nav {
      margin-top: 1rem;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 0.75rem 1.5rem;
    }
 
    nav a {
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-light);
      text-decoration: none;
      transition: color 0.2s;
      font-family: 'Trebuchet MS', Georgia, serif;
    }
 
    nav a:hover { color: var(--accent); }
    nav a.active { color: var(--accent); }
 
    /* ── WRAPPER ── */
    .awards-wrapper {
      max-width: 680px;
      margin: 5rem auto 6rem;
      padding: 0 2rem;
      animation: fadeUp 0.7s ease both;
    }
 
    /* ── PAGE HEADER ── */
    .awards-label {
      font-family: 'Courier Prime', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1.5rem;
    }
 
    .awards-title {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(2rem, 5vw, 2.9rem);
      font-weight: 400;
      line-height: 1.2;
      color: #FFFFFF;
    }
 
    .awards-meta {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem 1.5rem;
      margin-top: 1.75rem;
      padding-bottom: 1.75rem;
      border-bottom: 1px solid #1a1a1a;
    }
 
    .meta-item {
      font-family: 'Trebuchet MS', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-light);
    }
 
    .meta-item span {
      display: block;
      text-align: center;
      color: #FFFFFF;
      margin-top: 0.2rem;
      font-size: 0.72rem;
    }
 
    .meta-divider {
      width: 1px;
      height: 2rem;
      background: #1a1a1a;
    }
 
    /* ── AWARD BLOCK ── */
    .award-block {
      padding: 2rem 0;
      border-bottom: 1px solid #1a1a1a;
    }
 
    .award-category {
      font-family: 'Courier Prime', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.6rem;
    }
 
    .award-winner {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 1.4rem;
      font-style: italic;
      font-weight: 400;
      color: #FFFFFF;
      line-height: 1.3;
    }
 
    .award-detail {
      font-family: 'EB Garamond', serif;
      font-size: 0.95rem;
      color: var(--ink-light);
      margin-top: 0.3rem;
    }
 
    .award-note {
      font-family: 'EB Garamond', serif;
      font-size: 1rem;
      color: #cccccc;
      margin-top: 0.75rem;
      line-height: 1.7;
    }
 
    /* ── FOOTER ── */
    footer {
      padding: 2rem;
      text-align: center;
      font-size: 0.8rem;
      color: #d1a2a9;
      letter-spacing: 0.05em;
      font-family: 'Trebuchet MS', Georgia, serif;
    }
 
    footer::before {
      content: '';
      display: block;
      width: 75%;
      margin: 0 auto 2rem;
      height: 1px;
      background: var(--rule);
    }
 
    /* ── ANIMATIONS ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
 
    /* ── RESPONSIVE ── */
    @media (max-width: 560px) {
      header { padding: 1.5rem 1rem 1rem; }
      .site-title { font-size: 1.5rem; }
      nav { gap: 0.5rem 1rem; }
      nav a { font-size: 0.7rem; }
 
      .awards-wrapper { margin-top: 2.5rem; padding: 0 1.25rem; }
      .meta-divider { display: none; }
      .award-winner { font-size: 1.2rem; }
    }
  </style>
</head>
<body>
 
  <!-- HEADER -->
  <header>
    <a class="site-title" href="index.html">Art Public</a>
    <nav>
      <a href="reading-list.html">Reading List</a>
      <a href="review.html">Reviews</a>
      <a href="quotes.html">Quotes</a>
      <a href="awards.html" class="active">Awards</a>
      <a href="about.html">About</a>
    </nav>
  </header>
 
  <!-- AWARDS -->
  <article class="awards-wrapper">
 
    <p class="awards-label">Annual Art Public Book Awards</p>
    <h1 class="awards-title">2025</h1>
 
    <div class="awards-meta">
      <div class="meta-item">
        Readers
        <span>Luke & Naomi Brown</span>
      </div>
      <div class="meta-divider"></div>
      <div class="meta-item">
        Books Read
        <span>16</span>
      </div>
      <div class="meta-divider"></div>
      <div class="meta-item">
        Year
        <span>2025</span>
      </div>
    </div>
  </article>
 
  <!-- FOOTER -->
  <footer>
    <p>© 2026 Art Public</p>
    <a href="login.html" style="display: block; text-align: center; margin-top: 1rem; font-size: 0.75rem; letter-spacing: 0.1em; color: #6b6560; text-decoration: none;">Publisher Login</a>
  </footer>
  

  <script>
    const SUPABASE_URL = 'https://bovnudbyavpevxgmlqts.supabase.co'
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJvdm51ZGJ5YXZwZXZ4Z21scXRzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2OTU3MTIsImV4cCI6MjA5MzI3MTcxMn0.1iYpqgwp8-Sq2yCtaavmk7iRQQkf9FAF_yHs6u96jow'
  
    async function loadAwards() {
      const response = await fetch(`${SUPABASE_URL}/rest/v1/awards?year=eq.2025&order=id.asc`, {
        headers: {
          apikey: SUPABASE_KEY,
          Authorization: `Bearer ${SUPABASE_KEY}`
        }
      })
  
      const awards = await response.json()
      const container = document.querySelector('.awards-wrapper')
  
      // Remove hardcoded award blocks
      document.querySelectorAll('.award-block').forEach(el => el.remove())
  
      awards.forEach(award => {
        container.innerHTML += `
          <div class="award-block">
            <p class="award-category">${award.category}</p>
            <p class="award-winner">${award.winner}</p>
            <p class="award-detail">${award.detail}</p>
            <p class="award-note">${award.note}</p>
          </div>
        `
      })
    }
  
    loadAwards()
  </script>
 
</body>
</html>
