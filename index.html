<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Art Public — A Book Blog</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
    :root {
      --ink: #666193;
      --ink-light: #6b6560;
      --paper: #faf8f4;
      --accent: #d1a2a9;
      --rule: #d8d2c8;
      --max: 720px;
    }
 
    html { font-size: 18px; scroll-behavior: smooth; }
 
    body {
      background: #000000;
      color: #FFFFFF;
      font-family: 'Trebuchet MS', Georgia, serif;
      line-height: 1.75;
      -webkit-font-smoothing: antialiased;
    }
 
    /* ── HEADER ── */
    header {
      padding: 2.5rem 2rem 1.5rem;
      text-align: center;
      position: sticky;
      top: 0;
      background: #000000;
      z-index: 100;
    }
 
    header::after {
      content: '';
      display: block;
      width: 75%;
      margin: 1.5rem auto 0;
      height: 1px;
      background: var(--rule);
    }
 
    .site-title {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 1.9rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: #FFFFFF;
      text-decoration: none;
    }
 
    nav {
      margin-top: 1rem;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 0.75rem 1.5rem;
    }
 
    nav a {
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-light);
      text-decoration: none;
      transition: color 0.2s;
    }
 
    nav a:hover { color: var(--accent); }
 
    /* ── HERO ── */
    .hero {
      max-width: var(--max);
      margin: 5rem auto 3rem;
      padding: 0 2rem;
      text-align: center;
      animation: fadeUp 0.7s ease both;
    }
 
    .hero-label {
      font-size: 0.75rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #FFFFFF;
      margin-bottom: 1rem;
    }
 
    .hero h3 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(2rem, 6vw, 3.2rem);
      font-weight: 400;
      line-height: 1.25;
      color: #FFFFFF;
    }
 
    .book-author {
      font-family: 'EB Garamond', serif;
      font-size: 1.1rem;
      font-style: italic;
      color: var(--ink-light);
      margin-top: 0.5rem;
    }
 
    .hero-excerpt {
      margin-top: 1.5rem;
      font-size: 1.05rem;
      color: #FFFFFF;
      max-width: 520px;
      margin-left: auto;
      margin-right: auto;
    }
 
    .btn {
      display: inline-block;
      margin-top: 2rem;
      padding: 0.6rem 1.6rem;
      border: 1px solid var(--ink);
      color: var(--ink);
      text-decoration: none;
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: background 0.2s, color 0.2s;
    }
 
    .btn:hover { background: var(--ink); color: var(--paper); }
 
    /* ── FOOTER ── */
    footer {
      padding: 2rem;
      text-align: center;
      font-size: 0.8rem;
      color: #d1a2a9;
      letter-spacing: 0.05em;
    }
 
    footer::before {
      content: '';
      display: block;
      width: 75%;
      margin: 0 auto 2rem;
      height: 1px;
      background: var(--rule);
    }
 
    /* ── ANIMATIONS ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
 
    /* ── RESPONSIVE ── */
    @media (max-width: 560px) {
      header { padding: 1.5rem 1rem 1rem; }
      .site-title { font-size: 1.5rem; }
      nav { gap: 0.5rem 1rem; }
      nav a { font-size: 0.7rem; }
      .hero { margin-top: 2.5rem; }
      .hero-excerpt { font-size: 1rem; }
    }
  </style>
</head>
<body>
 
  <!-- HEADER -->
  <header>
    <a class="site-title" href="index.html" class="active">Art Public</a>
    <nav>
      <a href="reading-list.html">Reading List</a>
      <a href="review.html">Reviews</a>
      <a href="awards.html">Awards</a>
      <a href="marginalia.html">Chat</a>
      <a href="about.html">About</a>
    </nav>
  </header>
 
  <!-- FEATURED POST / HERO -->
  <section class="hero">
    <h4 class="hero-label">Book Review</h4>
    <h3 id="hero-title"></h3>
    <p class="book-author" id="hero-author"></p>
    <p class="hero-excerpt" id="hero-excerpt"></p>
    <a class="btn" href="review.html">Read the review</a>
  </section>
 
  <!-- FOOTER -->
  <footer>
    <p>© 2026 Art Public</p>
    <a href="login.html" style="display: block; text-align: center; margin-top: 1rem; font-size: 0.75rem; letter-spacing: 0.1em; color: #6b6560; text-decoration: none;">Publisher Login</a>
  </footer>

  <script>

    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJvdm51ZGJ5YXZwZXZ4Z21scXRzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2OTU3MTIsImV4cCI6MjA5MzI3MTcxMn0.1iYpqgwp8-Sq2yCtaavmk7iRQQkf9FAF_yHs6u96jow'

    loadFeatured()
  </script>

</body>
</html>
