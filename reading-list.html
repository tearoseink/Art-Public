<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reading List — Art Public</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
    :root {
      --ink: #666193;
      --ink-light: #6b6560;
      --accent: #d1a2a9;
      --rule: #d8d2c8;
    }
 
    html { font-size: 18px; scroll-behavior: smooth; }
 
    body {
      background: #000000;
      color: #FFFFFF;
      font-family: 'Trebuchet MS', Georgia, serif;
      line-height: 1.75;
      -webkit-font-smoothing: antialiased;
    }
 
    /* ── HEADER ── */
    header {
      padding: 2.5rem 2rem 1.5rem;
      text-align: center;
      position: sticky;
      top: 0;
      background: #000000;
      z-index: 100;
    }
 
    header::after {
      content: '';
      display: block;
      width: 75%;
      margin: 1.5rem auto 0;
      height: 1px;
      background: var(--rule);
    }
 
    .site-title {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 1.9rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: #FFFFFF;
      text-decoration: none;
    }
 
    nav {
      margin-top: 1rem;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 0.75rem 1.5rem;
    }
 
    nav a {
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-light);
      text-decoration: none;
      transition: color 0.2s;
      font-family: 'Trebuchet MS', Georgia, serif;
    }
 
    nav a:hover { color: var(--accent); }
    nav a.active { color: var(--accent); }
 
    /* ── TABLE ── */
    .table-wrapper {
      max-width: 900px;
      margin: 3rem auto 0;
      padding: 0 3rem 6rem;
      animation: fadeIn 0.7s ease 0.1s both;
    }
 
    /* ── BOOK ROW ── */
    .book-row {
      display: grid;
      grid-template-columns: 2rem 1fr 1fr 7rem 6rem;
      gap: 1rem;
      align-items: center;
      padding: 1.25rem 0;
      border-bottom: 1px solid #1a1a1a;
      cursor: default;
      transition: background 0.15s;
    }
 
    .book-row:hover {
      background: #0d0d0d;
      padding-left: 0.5rem;
      padding-right: 0.5rem;
      margin: 0 -0.5rem;
    }
 
    .book-num {
      font-family: 'Courier Prime', monospace;
      font-size: 0.7rem;
      color: #333;
      letter-spacing: 0.05em;
    }
 
    .book-title-col {
      display: flex;
      flex-direction: column;
      gap: 0.15rem;
    }
 
    .book-title {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 1rem;
      font-weight: 400;
      font-style: italic;
      color: #FFFFFF;
      line-height: 1.3;
    }
 
    /* Reviewed titles get an underline hint on hover */
    a.book-title {
      text-decoration: none;
      color: #FFFFFF;
      transition: color 0.2s;
    }
 
    a.book-title:hover {
      color: var(--accent);
    }
 
    .book-note {
      font-size: 0.78rem;
      color: var(--ink-light);
      font-family: 'EB Garamond', serif;
      font-style: normal;
      line-height: 1.4;
      margin-top: 0.1rem;
    }
 
    .book-author {
      font-family: 'Trebuchet MS', Georgia, serif;
      font-size: 0.92rem;
      color: #aaa;
    }
 
    .book-genre {
      font-family: 'Courier Prime', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
    }
 
    .book-nationality {
      font-family: 'Trebuchet MS', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-light);
    }
 
    /* ── REVIEWED BADGE ── */
    .reviewed-badge {
      font-family: 'Courier Prime', monospace;
      font-size: 0.55rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      border: 1px solid var(--accent);
      padding: 0.1rem 0.35rem;
      margin-left: 0.5rem;
      vertical-align: middle;
    }
 
    /* ── SECTION DIVIDER ── */
    .section-label {
      font-family: 'Courier Prime', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--accent);
      padding: 2rem 0 0.75rem;
      border-bottom: 1px solid var(--rule);
      margin-top: 1rem;
    }
 
    /* ── FOOTER ── */
    footer {
      padding: 2rem;
      text-align: center;
      font-size: 0.8rem;
      color: #d1a2a9;
      letter-spacing: 0.05em;
      font-family: 'Trebuchet MS', Georgia, serif;
    }
 
    footer::before {
      content: '';
      display: block;
      width: 75%;
      margin: 0 auto 2rem;
      height: 1px;
      background: var(--rule);
    }
 
    /* ── ANIMATIONS ── */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
 
    /* ── RESPONSIVE ── */
    @media (max-width: 640px) {
      header { padding: 1.5rem 1rem 1rem; }
      .site-title { font-size: 1.5rem; }
      nav { gap: 0.5rem 1rem; }
      nav a { font-size: 0.7rem; }
 
      .table-wrapper { padding: 0 1.25rem 4rem; }
 
      .book-row {
        grid-template-columns: 1.5rem 1fr;
        gap: 0.75rem;
      }
 
      .book-author,
      .book-genre,
      .book-nationality { display: none; }
 
      .book-title { font-size: 0.95rem; }
      .book-note { font-size: 0.75rem; }
    }
  </style>
</head>
<body>
 
  <!-- HEADER -->
  <header>
    <a class="site-title" href="index.html">Art Public</a>
    <nav>
      <a href="reading-list.html" class="active">Reading List</a>
      <a href="review.html">Reviews</a>
      <a href="awards.html">Awards</a>
      <a href="marginalia.html">Chat</a>
      <a href="about.html">About</a>
    </nav>
  </header>
 
  <!-- TABLE -->
  <div class="table-wrapper">
 
    <div class="section-label">2026</div>
 
    <div id="book-list"></div>
 
  </div>
 
  <!-- FOOTER -->
  <footer>
    <p>© 2026 Art Public</p>
    <a href="login.html" style="display: block; text-align: center; margin-top: 1rem; font-size: 0.75rem; letter-spacing: 0.1em; color: #6b6560; text-decoration: none;">Publisher Login</a>
  </footer>
 
  <script>
    const SUPABASE_URL = 'https://bovnudbyavpevxgmlqts.supabase.co'
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJvdm51ZGJ5YXZwZXZ4Z21scXRzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2OTU3MTIsImV4cCI6MjA5MzI3MTcxMn0.1iYpqgwp8-Sq2yCtaavmk7iRQQkf9FAF_yHs6u96jow'


  function titleToId(title) {
    return title
      .toLowerCase()
      .replace(/[^a-z0-9\s-]/g, '')
      .trim()
      .replace(/\s+/g, '-');
  }

async function loadBooks() {
  // Fetch reviewed titles from Supabase
  const reviewsResponse = await fetch(`${SUPABASE_URL}/rest/v1/reviews?select=title`, {
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: `Bearer ${SUPABASE_KEY}`
    }
  })
  const reviews = await reviewsResponse.json()
  const reviewedTitles = new Set(reviews.map(r => r.title.toLowerCase().trim()))

  // Fetch books
  const booksResponse = await fetch(`${SUPABASE_URL}/rest/v1/reading_list?year=eq.2026&order=id.asc`, {
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: `Bearer ${SUPABASE_KEY}`
    }
  })
  const books = await booksResponse.json()
  const container = document.getElementById('book-list')

  books.forEach(book => {
    const reviewed = reviewedTitles.has(book.title.toLowerCase().trim())
    const titleHTML = reviewed
      ? `<a class="book-title" href="review.html#${titleToId(book.title)}">${book.title}<span class="reviewed-badge">Review</span></a>`
      : `<span class="book-title">${book.title}</span>`

    container.innerHTML += `
      <div class="book-row">
        <span class="book-num">${book.number || ''}</span>
        <div class="book-title-col">
          ${titleHTML}
          <span class="book-note">${book.reader ? book.reader + ' | ' + book.month : book.month}</span>
        </div>
        <span class="book-author">${book.author || ''}</span>
        <span class="book-genre">${book.genre || ''}</span>
        <span class="book-nationality">${book.nationality || ''}</span>
      </div>
    `
  })
}

  loadBooks()
</script>
 
</body>
</html>
