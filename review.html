<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reviews — Art Public</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
    :root {
      --ink: #666193;
      --ink-light: #6b6560;
      --paper: #faf8f4;
      --accent: #d1a2a9;
      --rule: #d8d2c8;
    }
 
    html { font-size: 18px; scroll-behavior: smooth; }
 
    body {
      background: #000000;
      color: #FFFFFF;
      font-family: 'EB Garamond', Georgia, serif;
      line-height: 1.8;
      -webkit-font-smoothing: antialiased;
    }
 
    /* ── HEADER ── */
    header {
      padding: 2.5rem 2rem 1.5rem;
      text-align: center;
      position: sticky;
      top: 0;
      background: #000000;
      z-index: 100;
    }
 
    header::after {
      content: '';
      display: block;
      width: 75%;
      margin: 1.5rem auto 0;
      height: 1px;
      background: var(--rule);
    }
 
    .site-title {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 1.9rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: #FFFFFF;
      text-decoration: none;
    }
 
    nav {
      margin-top: 1rem;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap:  0.75rem 1.5rem;
    }
 
    nav a {
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-light);
      text-decoration: none;
      transition: color 0.2s;
      font-family: 'Trebuchet MS', Georgia, serif;
    }
 
    nav a:hover { color: var(--accent); }
    nav a.active { color: var(--accent); }
 
    /* ── REVIEW CONTAINER ── */
    .review-wrapper {
      max-width: 680px;
      margin: 5rem auto 6rem;
      padding: 0 2rem;
      animation: fadeUp 0.7s ease both;
    }
 
    .review-wrapper + .review-divider {
      max-width: 680px;
      margin: 0 auto;
      padding: 0 2rem;
    }
 
    /* ── HEADER BLOCK ── */
    .review-label {
      font-family: 'Courier Prime', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1.5rem;
    }
 
    .review-title {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(2rem, 5vw, 2.9rem);
      font-weight: 400;
      line-height: 1.2;
      color: #FFFFFF;
    }
 
    .review-author-book {
      font-family: 'EB Garamond', serif;
      font-size: 1.1rem;
      font-style: italic;
      color: var(--ink-light);
      margin-top: 0.5rem;
    }
 
    .review-meta {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      margin-top: 1.75rem;
      padding-bottom: 1.75rem;
      border-bottom: 1px solid #1a1a1a;
    }
 
    .meta-item {
      font-family: 'Trebuchet MS', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-light);
    }
 
    .meta-item span {
      display: block;
      color: #FFFFFF;
      margin-top: 0.2rem;
      font-size: 0.72rem;
    }
 
    .meta-divider {
      width: 1px;
      height: 2rem;
      background: #1a1a1a;
    }
 
    /* ── BODY ── */
    .review-body p {
      font-size: 1.05rem;
      color: #cccccc;
      margin-top: 1.5rem;
      margin-bottom: 1.5rem;
    }
 
    .question {
      font-size: 1.05rem;
      color: #cccccc;
      margin-bottom: 1.5rem;
      font-family: 'Trebuchet MS';
    }
 
    /* ── SECTION BREAK ── */
    .section-break {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 2.5rem 0;
    }
 
    .section-break::before,
    .section-break::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #1a1a1a;
    }
 
    .section-break-glyph {
      font-family: 'Playfair Display', serif;
      color: var(--accent);
      font-size: 1rem;
    }
 
    /* ── RATING ── */
    .review-rating {
      margin-top: 3rem;
      padding-top: 2rem;
      border-top: 1px solid #1a1a1a;
      display: flex;
      align-items: baseline;
      gap: 1rem;
    }
 
    .rating-label {
      font-family: 'Courier Prime', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--ink-light);
    }
 
    .rating-value {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 1.6rem;
      color: var(--accent);
    }
 
    .rating-max {
      font-family: 'EB Garamond', serif;
      font-size: 0.9rem;
      color: var(--ink-light);
    }
 
    /* ── REVIEW DIVIDER ── */
    .review-divider {
      max-width: 680px;
      margin: 0 auto;
      padding: 0 2rem;
    }
 
    .review-divider hr {
      border: none;
      height: 1px;
      background: var(--rule);
      margin-bottom: 5rem;
    }
 
    /* ── FOOTER ── */
    footer {
      padding: 2rem;
      text-align: center;
      font-size: 0.8rem;
      color: #d1a2a9;
      letter-spacing: 0.05em;
      font-family: 'Trebuchet MS', Georgia, serif;
    }
 
    footer::before {
      content: '';
      display: block;
      width: 75%;
      margin: 0 auto 2rem;
      height: 1px;
      background: var(--rule);
    }
 
    /* ── ANIMATIONS ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
 
    /* ── RESPONSIVE ── */
    @media (max-width: 560px) {
      .review-wrapper { margin-top: 3rem; }
      .review-meta { flex-wrap: wrap; gap: 1rem; }
      .meta-divider { display: none; }
      nav { gap: 0.5rem 1rem; }
      nav a { font-size: 0.7rem; }
    }
  </style>
</head>
<body>
 
  <!-- HEADER -->
  <header>
    <a class="site-title" href="index.html">Art Public</a>
    <nav>
      <a href="reading-list.html">Reading List</a>
      <a href="review.html" class="active">Reviews</a>
      <a href="quotes.html">Quotes</a>
      <a href="awards.html">Awards</a>
      <a href="about.html">About</a>
    </nav>
  </header>
 
  <!-- REVIEWS RENDERED HERE BY JS -->
  <div id="reviews-container"></div>
 
  <!-- FOOTER -->
  <footer>
    <p>© 2026 Art Public</p>
    <a href="login.html" style="display: block; text-align: center; margin-top: 1rem; font-size: 0.75rem; letter-spacing: 0.1em; color: #6b6560; text-decoration: none;">Publisher Login</a>
  </footer>
 
  <script>
    const SUPABASE_URL = 'https://bovnudbyavpevxgmlqts.supabase.co'
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJvdm51ZGJ5YXZwZXZ4Z21scXRzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2OTU3MTIsImV4cCI6MjA5MzI3MTcxMn0.1iYpqgwp8-Sq2yCtaavmk7iRQQkf9FAF_yHs6u96jow'
  
    function titleToId(title) {
  return title
    .toLowerCase()
    .replace(/[^a-z0-9\s-]/g, '')
    .trim()
    .replace(/\s+/g, '-');
}

function renderReview(review, isFirst) {
  let bodyHTML = '';

  if (!review.qa) {
    bodyHTML = review.body.map(p => `<p>${p}</p>`).join('');
  } else {
    bodyHTML = review.body.map((section, i) => {
      const divider = i > 0
        ? `<div class="section-break"><span class="section-break-glyph">◆</span></div>`
        : '';
      const questionHTML = section.question
        ? `<p class="question"><strong>${section.question}</strong></p>`
        : '';
      const paragraphsHTML = section.paragraphs.map(p => `<p>${p}</p>`).join('');
      return `${divider}<div class="qa-block">${questionHTML}${paragraphsHTML}</div>`;
    }).join('');
  }

  const id = titleToId(review.title);
  const marginStyle = isFirst ? '' : ' style="margin-top: 0;"';

  return `
    <article class="review-wrapper" id="${id}"${marginStyle}>
      <p class="review-label">Book Review</p>
      <h1 class="review-title">${review.title}</h1>
      <p class="review-author-book">${review.author}</p>
      <div class="review-meta">
        <div class="meta-item">Reviewed by <span>${review.reviewer}</span></div>
        <div class="meta-divider"></div>
        <div class="meta-item">Genre <span>${review.genre}</span></div>
        <div class="meta-divider"></div>
        <div class="meta-item">Date <span>${review.date}</span></div>
      </div>
      <div class="review-body">
        ${bodyHTML}
      </div>
      <div class="review-rating">
        <span class="rating-label">Rating</span>
        <span class="rating-value">${review.rating}</span>
        <span class="rating-max">/ ${review.rating_max}</span>
      </div>
    </article>
  `;
}

async function loadReviews() {
  const response = await fetch(`${SUPABASE_URL}/rest/v1/reviews?order=order.desc`,{
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: `Bearer ${SUPABASE_KEY}`
    }
  })

  const reviews = await response.json()
  const container = document.getElementById('reviews-container')

  reviews.forEach((review, index) => {
    if (index > 0) {
      container.innerHTML += `<div class="review-divider"><hr /></div>`
    }
    container.innerHTML += renderReview(review, index === 0)
  })

  // Scroll to anchor AFTER reviews are rendered
  const hash = window.location.hash
  if (hash) {
    setTimeout(() => {
      const target = document.querySelector(hash)
      if (target) {
        target.scrollIntoView({ behavior: 'smooth' })
      }
    }, 100)
  }
}

loadReviews()
</script>
 
</body>
</html>
